name: Release (Windows)

# Builds a Windows MSI installer + a portable (no-install) app image, both with a
# bundled trimmed JRE so the end user needs no Java installed.
#
# Triggered by pushing a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`),
# which also publishes a GitHub Release with the artifacts attached. Can also be run
# manually from the Actions tab (workflow_dispatch) to produce artifacts without a release.
#
# Why windows-latest: jpackage can only build a package for the OS it runs on, and this
# project resolves platform-classified JavaFX jars from the build host's OS — so a Windows
# package must be built on Windows. The runner ships WiX Toolset v3.14.1, which is exactly
# what jpackage needs for MSI generation (do NOT install WiX 4+, jpackage can't use it).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create/update the GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Temurin only bootstraps the JVM that runs Gradle. The app itself is compiled with, and
      # bundles, the JetBrains Runtime (JBR) — the Kotlin toolchain requests vendor=JETBRAINS and
      # the foojay resolver auto-provisions jbrsdk_jcef-25 for windows-x64 during the build (see
      # build.gradle.kts). gradle/actions/setup-gradle caches the provisioned JBR between runs.
      - name: Set up JDK 25 (Gradle bootstrap)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Tag vX.Y.Z -> packageVersion X.Y.Z. A non-version ref (e.g. manual workflow_dispatch on a
      # branch) falls back to 0.0.0 so the build still succeeds.
      - name: Derive app version from tag
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v?(\d+\.\d+\.\d+)$') { $v = $Matches[1] }
          else { $v = "0.0.0"; Write-Host "::warning::ref '$ref' is not a vX.Y.Z tag; defaulting packageVersion to $v" }
          Write-Host "packageVersion = $v"
          "version=$v" >> $env:GITHUB_OUTPUT

      # NOTE: This AOT-cache generation step is unvalidated until the next real release run.
      # If generation fails (e.g. the launcher can't open a display, or JBR doesn't support
      # AOTCacheOutput on this runner), the build still succeeds — AOTMode=auto means the shipped
      # app silently falls back to normal class loading when the cache is absent or stale.
      #
      # Sequence:
      #   1. Build the app image (createDistributable) with the AOT flags already in jvmArgs.
      #   2. Run the launcher once in --train mode with JAVA_TOOL_OPTIONS=-XX:AOTCacheOutput=<path>
      #      so JBR's exact bundled classpath is used (no manual reconstruction needed). On Windows
      #      the runner has a desktop session so no xvfb-run wrapper is needed.
      #   3. Copy the produced .aot into the app image's resources/ dir (where $APPDIR/resources/
      #      resolves at runtime) so the subsequent packageMsi step bundles it into the installer.
      - name: Build app image and generate JDK 25 AOT cache
        shell: pwsh
        run: |
          .\gradlew.bat :desktopApp:createDistributable "-PappVersion=${{ steps.version.outputs.version }}" --no-configuration-cache --stacktrace

          $appRoot = "desktopApp/build/compose/binaries/main/app"
          $appDir = (Get-ChildItem -Directory $appRoot | Select-Object -First 1).FullName
          $launcher = Join-Path $appDir "eJournal.exe"
          $aotOut = "build/aot/ejournal.aot"
          New-Item -ItemType Directory -Force -Path (Split-Path $aotOut) | Out-Null

          Write-Host "Generating AOT cache via --train mode..."
          $env:JAVA_TOOL_OPTIONS = "-XX:AOTCacheOutput=$PWD/$aotOut"
          & $launcher --train
          Remove-Item Env:\JAVA_TOOL_OPTIONS

          if (Test-Path $aotOut) {
            $size = (Get-Item $aotOut).Length
            Write-Host "AOT cache generated: $aotOut ($size bytes)"
            $resourcesDir = Join-Path $appDir "app/resources"
            New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null
            Copy-Item $aotOut -Destination (Join-Path $resourcesDir "ejournal.aot") -Force
            Write-Host "Copied AOT cache into app image resources."
          } else {
            Write-Warning "AOT cache was NOT generated — continuing without it (AOTMode=auto will degrade safely)."
          }

      - name: Build MSI installer and portable app image
        # --no-configuration-cache: jpackage tasks don't always play well with the config
        # cache (enabled in gradle.properties); packaging runs once so the cache buys nothing here.
        # createDistributable was already run in the AOT step above; packageMsi reuses its output.
        run: .\gradlew.bat :desktopApp:packageMsi "-PappVersion=${{ steps.version.outputs.version }}" --no-configuration-cache --stacktrace

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $appRoot = "desktopApp/build/compose/binaries/main/app"
          $appDir = (Get-ChildItem -Directory $appRoot | Select-Object -First 1)
          Compress-Archive -Path $appDir.FullName -DestinationPath "eJournal-portable-windows.zip" -Force

          $msi = Get-ChildItem -Recurse -Filter *.msi "desktopApp/build/compose/binaries/main/msi" | Select-Object -First 1
          Copy-Item $msi.FullName -Destination "eJournal-windows.msi"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ejournal-windows
          path: |
            eJournal-portable-windows.zip
            eJournal-windows.msi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            eJournal-portable-windows.zip
            eJournal-windows.msi
