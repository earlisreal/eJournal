name: Release (Windows)

# Builds a Windows MSI installer + a portable (no-install) app image, both with a
# bundled trimmed JRE so the end user needs no Java installed.
#
# Triggered by pushing a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`),
# which also publishes a GitHub Release with the artifacts attached. Can also be run
# manually from the Actions tab (workflow_dispatch) to produce artifacts without a release.
#
# Why windows-latest: jpackage can only build a package for the OS it runs on, and this
# project resolves platform-classified JavaFX jars from the build host's OS — so a Windows
# package must be built on Windows. The runner ships WiX Toolset v3.14.1, which is exactly
# what jpackage needs for MSI generation (do NOT install WiX 4+, jpackage can't use it).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create/update the GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build MSI installer and portable app image
        # --no-configuration-cache: jpackage tasks don't always play well with the config
        # cache (enabled in gradle.properties); packaging runs once so the cache buys nothing here.
        run: .\gradlew.bat :desktopApp:packageMsi :desktopApp:createDistributable --no-configuration-cache --stacktrace

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $appRoot = "desktopApp/build/compose/binaries/main/app"
          $appDir = (Get-ChildItem -Directory $appRoot | Select-Object -First 1)
          Compress-Archive -Path $appDir.FullName -DestinationPath "eJournal-portable-windows.zip" -Force

          $msi = Get-ChildItem -Recurse -Filter *.msi "desktopApp/build/compose/binaries/main/msi" | Select-Object -First 1
          Copy-Item $msi.FullName -Destination "eJournal-windows.msi"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ejournal-windows
          path: |
            eJournal-portable-windows.zip
            eJournal-windows.msi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            eJournal-portable-windows.zip
            eJournal-windows.msi
